# ──────────────────────────────────────────────────────────────
# FinGuard Secrets — Template
# In production, these are injected via CI/CD or a secrets manager.
# For local Minikube, create manually:
#   kubectl create secret generic finguard-secrets \
#     --from-literal=openai-api-key=sk-... \
#     -n finguard
# ──────────────────────────────────────────────────────────────
apiVersion: v1
kind: Secret
metadata:
  name: finguard-secrets
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  openai-api-key: {{ .Values.api.env.OPENAI_API_KEY | quote }}
